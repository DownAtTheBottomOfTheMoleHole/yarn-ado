name: PR Validation and Private Publish

on:
  pull_request:
    branches:
      - main
      - dev

permissions:
  contents: read
  pull-requests: read

jobs:
  validate:
    name: Build, Lint, and Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "24.x"
          check-latest: true

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test:no-build

  publish-private:
    name: Publish Private Extension
    runs-on: ubuntu-latest
    needs: validate
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    env:
      PUBLISHER_ID: ${{ secrets.PUBLISHER_ID }}
      PUBLIC_EXTENSION_ID: ${{ secrets.PUBLIC_EXTENSION_ID }}
      PRIVATE_EXTENSION_ID: ${{ secrets.PRIVATE_EXTENSION_ID }}
      PUBLIC_EXTENSION_NAME: ${{ secrets.PUBLIC_EXTENSION_NAME }}
      PRIVATE_EXTENSION_NAME: ${{ secrets.PRIVATE_EXTENSION_NAME }}
      PUBLIC_TASK_ID_YARN: ${{ secrets.PUBLIC_TASK_ID_YARN }}
      PUBLIC_TASK_ID_YARN_INSTALLER: ${{ secrets.PUBLIC_TASK_ID_YARN_INSTALLER }}
      PRIVATE_TASK_ID_YARN: ${{ secrets.PRIVATE_TASK_ID_YARN }}
      PRIVATE_TASK_ID_YARN_INSTALLER: ${{ secrets.PRIVATE_TASK_ID_YARN_INSTALLER }}
      TASK_YARN_NAME: ${{ secrets.TASK_YARN_NAME }}
      TASK_YARN_INSTALLER_NAME: ${{ secrets.TASK_YARN_INSTALLER_NAME }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Install GitVersion
        uses: gittools/actions/gitversion/setup@bc6623af8fc07d5a8903052dd46da33403eec8e8 # v4.5.0
        with:
          versionSpec: "6.x"
          preferLatestVersion: true

      - name: Determine version
        uses: gittools/actions/gitversion/execute@bc6623af8fc07d5a8903052dd46da33403eec8e8 # v4.5.0
        with:
          configFilePath: GitVersion.yml

      - name: Set package version
        run: |
          EPOCH_MINUTES=$(( $(date -u +%s) / 60 ))
          echo "PACKAGE_VERSION=${GitVersion_Major}.${GitVersion_Minor}.${EPOCH_MINUTES}" >> "$GITHUB_ENV"

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "24.x"
          check-latest: true

      - name: Install dependencies
        run: npm install

      - name: Package private extension
        run: npm run package -- --version "$PACKAGE_VERSION" --noversiontransform

      - name: Install tfx-cli
        run: npm install -g tfx-cli

      - name: Publish private extension
        env:
          AZURE_DEVOPS_EXT_PAT: ${{ secrets.AZURE_DEVOPS_EXT_PAT }}
          AZURE_DEVOPS_ORGS: ${{ secrets.AZURE_DEVOPS_ORGS }}
        run: |
          if [[ -z "$AZURE_DEVOPS_EXT_PAT" || -z "$AZURE_DEVOPS_ORGS" ]]; then
            echo "Required publish secrets are not configured. Skipping private publish."
            exit 0
          fi

          VSIX_PATH=$(find .BuildOutput/dev -maxdepth 1 -name '*.vsix' | head -n 1)
          if [[ -z "$VSIX_PATH" ]]; then
            echo "No private VSIX found under .BuildOutput/dev."
            exit 1
          fi

          PACKAGED_PUBLISHER=$(node -e 'const fs=require("fs");const m=JSON.parse(fs.readFileSync(".BuildOutput/dev/vss-extension.json","utf8"));process.stdout.write(m.publisher);')
          PACKAGED_EXTENSION_ID=$(node -e 'const fs=require("fs");const m=JSON.parse(fs.readFileSync(".BuildOutput/dev/vss-extension.json","utf8"));process.stdout.write(m.id);')
          echo "Publishing private extension id: ${PACKAGED_EXTENSION_ID}"

          tfx extension publish \
            --vsix "$VSIX_PATH" \
            --publisher "$PACKAGED_PUBLISHER" \
            --extension-id "$PACKAGED_EXTENSION_ID" \
            --override '{"public": false}' \
            --service-url https://marketplace.visualstudio.com \
            --token "$AZURE_DEVOPS_EXT_PAT" \
            --share-with "$AZURE_DEVOPS_ORGS" \
            --no-prompt
