name: PR Code Validation and Publish Private Extension

# Trigger on pull requests to main branch
on:
  pull_request:
    branches:
      - main

permissions:
  contents: read
  pull-requests: read

env:
  npm_cache: ${{ github.workspace }}/npm_cache

jobs:
  # Build and test job
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: "24.x"
          check-latest: true

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test:no-build

  # Private extension publish job
  publish-private-extension:
    name: Publish Private Extension
    runs-on: ubuntu-latest
    needs: build-and-test
    # Only run if PR is from the same repository (not a fork)
    # This prevents exposing secrets to untrusted PR code from forks
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Install GitVersion
        uses: gittools/actions/gitversion/setup@bc6623af8fc07d5a8903052dd46da33403eec8e8 # v4.5.0
        with:
          versionSpec: "6.x"
          preferLatestVersion: true

      - name: Determine Version for PR
        uses: gittools/actions/gitversion/execute@bc6623af8fc07d5a8903052dd46da33403eec8e8 # v4.5.0
        with:
          configFilePath: GitVersion.yml

      - name: Set PR version with build number
        run: |
          # Use epoch minutes (minutes since 1970-01-01 UTC) as a monotonically increasing
          # build number that stays within TFX CLI's 0-2147483647 range per version component.
          # Current value is ~29.5 million, well under the ~2.1 billion max.
          # Version must be valid 3-part semver (major.minor.patch) for the package script.
          # Note: Collision risk exists if multiple PR runs start within the same minute,
          # but this is extremely rare in practice. If a collision occurs, retry the workflow.
          EPOCH_MINUTES=$(( $(date -u +%s) / 60 ))
          echo "PACKAGE_VERSION=${GitVersion_Major}.${GitVersion_Minor}.${EPOCH_MINUTES}" >> "$GITHUB_ENV"
          echo "Building PR version: ${GitVersion_Major}.${GitVersion_Minor}.${EPOCH_MINUTES}"

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: "24.x"
          check-latest: true

      - name: Install dependencies
        run: npm install

      - name: Package extension
        run: npm run package -- --version "$PACKAGE_VERSION" --noversiontransform

      - name: Install tfx-cli
        run: npm install -g tfx-cli

      - name: Locate VSIX
        run: |
          VSIX_PATH=$(find .BuildOutput/production -maxdepth 1 -name '*.vsix' | head -n 1)
          if [[ -z "$VSIX_PATH" ]]; then
            echo "No VSIX was generated."
            exit 1
          fi
          echo "VSIX_PATH=$VSIX_PATH" >> "$GITHUB_ENV"

      - name: Publish private extension
        env:
          AZURE_DEVOPS_EXT_PAT: ${{ secrets.AZURE_DEVOPS_EXT_PAT }}
          AZURE_DEVOPS_ORGS: ${{ secrets.AZURE_DEVOPS_ORGS }}
        run: |
          if [[ -z "$AZURE_DEVOPS_EXT_PAT" || -z "$AZURE_DEVOPS_ORGS" ]]; then
            echo "Required publish secrets are not configured. Skipping private extension publish."
            exit 0
          fi

          tfx extension publish \
            --vsix "$VSIX_PATH" \
            --override '{"public": false}' \
            --service-url https://marketplace.visualstudio.com \
            --token "$AZURE_DEVOPS_EXT_PAT" \
            --share-with "$AZURE_DEVOPS_ORGS"
