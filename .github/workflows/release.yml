name: Release Extension

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: 24.x
          check-latest: true

      - name: Install dependencies
        run: npm install

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

  publish-release:
    name: Package and Publish Release
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0

      - name: Install GitVersion
        uses: gittools/actions/gitversion/setup@bc6623af8fc07d5a8903052dd46da33403eec8e8
        with:
          versionSpec: 6.x
          preferLatestVersion: true

      - name: Determine release version
        uses: gittools/actions/gitversion/execute@bc6623af8fc07d5a8903052dd46da33403eec8e8
        with:
          configFilePath: GitVersion.yml

      - name: Export release version
        run: |
          echo "RELEASE_VERSION=${GitVersion_MajorMinorPatch}" >> "$GITHUB_ENV"
          echo "RELEASE_TAG=v${GitVersion_MajorMinorPatch}" >> "$GITHUB_ENV"

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: 24.x
          check-latest: true

      - name: Install dependencies
        run: npm install

      - name: Package extension
        run: npm run package -- --version "$RELEASE_VERSION"

      - name: Install tfx-cli
        run: npm install -g tfx-cli

      - name: Locate VSIX
        run: |
          VSIX_PATH=$(find .BuildOutput/production -maxdepth 1 -name '*.vsix' | head -n 1)
          if [[ -z "$VSIX_PATH" ]]; then
            echo "No VSIX was generated."
            exit 1
          fi
          echo "VSIX_PATH=$VSIX_PATH" >> "$GITHUB_ENV"

      - name: Publish public extension
        env:
          AZURE_DEVOPS_EXT_PAT: ${{ secrets.AZURE_DEVOPS_EXT_PAT }}
        run: |
          if [[ -z "$AZURE_DEVOPS_EXT_PAT" ]]; then
            echo "AZURE_DEVOPS_EXT_PAT is not configured. Skipping Marketplace publish."
            exit 0
          fi

          tfx extension publish \
            --vsix "$VSIX_PATH" \
            --service-url https://marketplace.visualstudio.com \
            --token "$AZURE_DEVOPS_EXT_PAT"

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" "$VSIX_PATH" --clobber
          else
            gh release create "$RELEASE_TAG" "$VSIX_PATH" --title "$RELEASE_TAG" --notes "Automated release for yarn-ado ${RELEASE_VERSION}."
          fi
