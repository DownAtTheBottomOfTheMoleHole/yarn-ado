name: Build and release extension

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

env:
  npm_cache: ${{ github.workspace }}/npm_cache

jobs:
  # Build, test and publish private extension job
  build:
    name: Build, Test and Publish Private Extension
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Install GitVersion
        if: ${{ !cancelled() }}
        uses: gittools/actions/gitversion/setup@bc6623af8fc07d5a8903052dd46da33403eec8e8 # v4.5.0
        with:
          versionSpec: "6.x"
          preferLatestVersion: true

      - name: Determine Version
        if: ${{ !cancelled() }}
        uses: gittools/actions/gitversion/execute@bc6623af8fc07d5a8903052dd46da33403eec8e8 # v4.5.0
        with:
          configFilePath: GitVersion.yml

      - name: Set extension version
        run: |
          # Use epoch minutes for private extension builds to maintain monotonic increase
          # and compatibility with PR builds (which also use epoch minutes).
          # Both PR and main branch builds publish to the same PRIVATE_EXTENSIONID,
          # so they must use the same versioning scheme to avoid conflicts.
          EPOCH_MINUTES=$(( $(date -u +%s) / 60 ))
          PRIVATE_EXT_VERSION="${{ env.GitVersion_Major }}.${{ env.GitVersion_Minor }}.${EPOCH_MINUTES}"
          echo "PRIVATE_EXTENSION_VERSION=$PRIVATE_EXT_VERSION" >> "$GITHUB_ENV"
          echo "RELEASE_VERSION=${{ env.GitVersion_MajorMinorPatch }}" >> "$GITHUB_ENV"
          echo "Building private extension version: $PRIVATE_EXT_VERSION"

      - name: Setup Node.js
        if: ${{ !cancelled() }}
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: "20.x"
          check-latest: true

      - name: Install dependencies
        if: ${{ !cancelled() }}
        run: npm install

      - name: Build
        if: ${{ !cancelled() }}
        run: npm run build

      - name: Lint
        if: ${{ !cancelled() }}
        run: npm run lint

      - name: Test
        if: ${{ !cancelled() }}
        run: npm run test:no-build

      - name: Replace tokens in extension manifest
        run: |
          PUBLISHER_ID="${{ secrets.PUBLISHERID || 'DownAtTheBottomOfTheMoleHole' }}"
          sed -i "s/#{publisherId}#/${PUBLISHER_ID}/g" Extension/vss-extension.json

      - name: Package extension
        run: npm run package -- --version "$PRIVATE_EXTENSION_VERSION" --noversiontransform

      - name: Install tfx-cli
        if: ${{ !cancelled() }}
        run: npm install -g tfx-cli

      - name: Locate VSIX
        run: |
          # Use the dev environment VSIX for private publishing.
          # npm run package creates per-environment VISXes from configuration.json;
          # the dev build has the "-dev" extension-ID suffix and separate task GUIDs
          # so it won't clash with the production (public) extension.
          VSIX_PATH=$(find .BuildOutput/dev -maxdepth 1 -name '*.vsix' | head -n 1)
          if [[ -z "$VSIX_PATH" ]]; then
            echo "No VSIX was generated."
            exit 1
          fi
          echo "VSIX_PATH=$VSIX_PATH" >> "$GITHUB_ENV"

      - name: Publish private extension
        env:
          AZURE_DEVOPS_EXT_PAT: ${{ secrets.AZURE_DEVOPS_EXT_PAT }}
          AZURE_DEVOPS_ORGS: ${{ secrets.AZURE_DEVOPS_ORGS }}
        run: |
          if [[ -z "$AZURE_DEVOPS_EXT_PAT" || -z "$AZURE_DEVOPS_ORGS" ]]; then
            echo "Required publish secrets are not configured. Skipping private extension publish."
            exit 0
          fi
          # Publisher is already baked into the VSIX via replace-tokens.
          # Extension ID is set by configuration.json (dev = "yarn-ado-dev").
          set +e
          PUBLISH_OUTPUT=$(tfx extension publish \
            --vsix "$VSIX_PATH" \
            --override '{"public": false}' \
            --service-url https://marketplace.visualstudio.com \
            --token "$AZURE_DEVOPS_EXT_PAT" \
            --share-with "$AZURE_DEVOPS_ORGS" \
            --no-wait-validation 2>&1)
          PUBLISH_EXIT=$?
          set -e

          echo "$PUBLISH_OUTPUT"

          if [[ $PUBLISH_EXIT -ne 0 ]]; then
            if echo "$PUBLISH_OUTPUT" | grep -qiE "Request timeout|timed out|ETIMEDOUT"; then
              echo "Private extension publish timed out; continuing so public release can proceed."
              exit 0
            fi
            echo "Private extension publish failed with a non-timeout error."
            exit $PUBLISH_EXIT
          fi

  # MegaLinter scan job (runs in parallel with build)
  scan:
    name: MegaLinter Scan
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[MegaLinter]')"
    continue-on-error: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT || secrets.GITHUB_TOKEN }}
          persist-credentials: true

      - name: Install Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: "20.x"
          check-latest: true

      - name: Install dependencies
        run: npm install

      - name: Run MegaLinter
        run: |
          git config --global user.email 'megalinter@megalinter.io'
          git config --global user.name 'Megalinter runner'
          npx mega-linter-runner -r v9 --fix --flavor ci_light
        env:
          APPLY_FIXES_EVENT: all
          APPLY_FIXES_MODE: pull_request
          AZURE_COMMENT_REPORTER: true
          CI: true
          DISABLE_ERRORS: true
          TF_BUILD: false
          SYSTEM_ACCESSTOKEN: ${{ secrets.GITHUB_TOKEN }}
          SYSTEM_COLLECTIONURI: ${{ github.server_url }}
          SYSTEM_TEAMPROJECT: ${{ github.repository }}
          BUILD_BUILD_ID: ${{ github.run_id }}
          BUILD_REPOSITORY_ID: ${{ github.repository }}
          VALIDATE_ALL_CODEBASE: false
        working-directory: ${{ github.workspace }}

      - name: Check if GITHUB_TOKEN is available
        id: check-token
        if: always()
        run: |
          if [ -n "${{ secrets.GITHUB_TOKEN }}" ]; then
            echo "token_available=true" >> $GITHUB_OUTPUT
          else
            echo "token_available=false" >> $GITHUB_OUTPUT
            echo "\u26a0\ufe0f GITHUB_TOKEN not available. PR creation will be skipped."
          fi

      - name: Create Pull Request with fixes
        if: always() && steps.check-token.outputs.token_available == 'true'
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "[MegaLinter] Apply linter fixes"
          title: "[MegaLinter] \U0001F527 Automated linter fixes"
          body: |
            ## Summary

            This automated PR applies code style and linting fixes detected by MegaLinter.

            ## Motivation / Context

            MegaLinter detected issues that can be automatically fixed. This PR contains the applied fixes to maintain code quality and consistency.

            ## How Has This Been Tested?

            - Fixes were automatically applied by MegaLinter's auto-fix feature
            - All enabled linters passed after applying fixes

            ## Checklist

            - [x] My code follows the style guidelines of this project
            - [x] I have performed a self-review of my own code
            - [x] My changes generate no new warnings
          branch: megalinter-fixes
          delete-branch: true
          labels: |
            automated
            linting
            megalinter

      - name: Publish MegaLinter reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: megalinter-reports
          path: ${{ github.workspace }}/megalinter-reports

  # Public release job \u2014 gated on both build and scan
  public_release:
    name: Package and Publish Public Release
    runs-on: ubuntu-latest
    needs: [build, scan]
    if: ${{ needs.build.result == 'success' && (needs.scan.result == 'success' || needs.scan.result == 'skipped') }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Install GitVersion
        if: ${{ !cancelled() }}
        uses: gittools/actions/gitversion/setup@bc6623af8fc07d5a8903052dd46da33403eec8e8 # v4.5.0
        with:
          versionSpec: "6.x"
          preferLatestVersion: true

      - name: Determine Version
        if: ${{ !cancelled() }}
        uses: gittools/actions/gitversion/execute@bc6623af8fc07d5a8903052dd46da33403eec8e8 # v4.5.0
        with:
          configFilePath: GitVersion.yml

      - name: Export release version
        run: |
          echo "RELEASE_VERSION=${{ env.GitVersion_MajorMinorPatch }}" >> "$GITHUB_ENV"
          echo "RELEASE_TAG=v${{ env.GitVersion_MajorMinorPatch }}" >> "$GITHUB_ENV"

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: "20.x"
          check-latest: true

      - name: Install dependencies
        run: npm install

      - name: Replace tokens in extension manifest
        run: |
          PUBLISHER_ID="${{ secrets.PUBLISHERID || 'DownAtTheBottomOfTheMoleHole' }}"
          sed -i "s/#{publisherId}#/${PUBLISHER_ID}/g" Extension/vss-extension.json

      - name: Package extension
        run: npm run package -- --version "$RELEASE_VERSION" --noversiontransform

      - name: Install tfx-cli
        run: npm install -g tfx-cli

      - name: Locate VSIX
        run: |
          # Use the production environment VSIX for public publishing.
          # This has no ID suffix and uses production task GUIDs from configuration.json.
          VSIX_PATH=$(find .BuildOutput/production -maxdepth 1 -name '*.vsix' | head -n 1)
          if [[ -z "$VSIX_PATH" ]]; then
            echo "No VSIX was generated."
            exit 1
          fi
          echo "VSIX_PATH=$VSIX_PATH" >> "$GITHUB_ENV"

      - name: Publish public extension
        env:
          AZURE_DEVOPS_EXT_PAT: ${{ secrets.AZURE_DEVOPS_EXT_PAT }}
        run: |
          if [[ -z "$AZURE_DEVOPS_EXT_PAT" ]]; then
            echo "AZURE_DEVOPS_EXT_PAT is not configured. Skipping Marketplace publish."
            exit 0
          fi
          # Publisher is already baked into the VSIX via replace-tokens.
          # Extension ID is set by configuration.json (production = "yarn-ado").
          tfx extension publish \
            --manifest-globs Extension/vss-extension.json \
            --override '{"public": true}' \
            --service-url https://marketplace.visualstudio.com \
            --token "$AZURE_DEVOPS_EXT_PAT" \
            --no-wait-validation

      - name: Install Extension to Azure DevOps Organizations
        env:
          AZURE_DEVOPS_EXT_PAT: ${{ secrets.AZURE_DEVOPS_EXT_PAT }}
          AZURE_DEVOPS_ORGS: ${{ secrets.AZURE_DEVOPS_ORGS }}
        run: |
          if [[ -z "$AZURE_DEVOPS_EXT_PAT" || -z "$AZURE_DEVOPS_ORGS" ]]; then
            echo "AZURE_DEVOPS_EXT_PAT or AZURE_DEVOPS_ORGS not configured. Skipping org installation."
            exit 0
          fi
          curl -sL https://aka.ms/InstallAzureCLIDeb | sudo bash
          IFS=',' read -ra ORGS <<< "$AZURE_DEVOPS_ORGS"
          for org in "${ORGS[@]}"; do
            echo "Installing extension to organization: $org"
            az devops configure --defaults organization="https://dev.azure.com/$org"
            az extension add --name azure-devops --allow-preview true || true
            echo "$AZURE_DEVOPS_EXT_PAT" | az devops login
            az devops extension install \
              --publisher-id "${{ secrets.PUBLISHERID }}" \
              --extension-id "${{ secrets.PUBLIC_EXTENSIONID }}" \
              --org "https://dev.azure.com/$org" || echo "Extension may already be installed in $org"
          done

  # Tag and GitHub release job \u2014 runs after successful public release
  new_release:
    name: Create new tagged release
    runs-on: ubuntu-latest
    needs: public_release
    if: ${{ needs.public_release.result == 'success' }}
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Install GitVersion
        uses: gittools/actions/gitversion/setup@bc6623af8fc07d5a8903052dd46da33403eec8e8 # v4.5.0
        with:
          versionSpec: "6.x"
          preferLatestVersion: true

      - name: Determine Version
        uses: gittools/actions/gitversion/execute@bc6623af8fc07d5a8903052dd46da33403eec8e8 # v4.5.0
        with:
          configFilePath: GitVersion.yml

      - name: Bump version and push tag
        id: tag_version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          NEW_TAG="v${{ env.GitVersion_SemVer }}"
          git fetch --tags --force
          PREVIOUS_TAG=$(git tag --sort=-v:refname | head -n 1 || echo "")
          CHANGELOG=""
          if [ -n "$PREVIOUS_TAG" ]; then
            CHANGELOG=$(git log "${PREVIOUS_TAG}..HEAD" --pretty=format:"* %s (%h)" 2>/dev/null || echo "")
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$NEW_TAG" -m "$NEW_TAG"
          git push origin "$NEW_TAG"
          echo "new_tag=${NEW_TAG}" >> "$GITHUB_OUTPUT"
          echo "previous_tag=${PREVIOUS_TAG}" >> "$GITHUB_OUTPUT"
          {
            echo "changelog<<EOF"
            echo "$CHANGELOG"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Generate Release Notes
        id: release_notes
        run: |
          echo "## What's New in ${{ steps.tag_version.outputs.new_tag }}" > release_notes.md
          echo "" >> release_notes.md
          echo "### \U0001F680 Yarn Azure DevOps Extension" >> release_notes.md
          echo "" >> release_notes.md
          echo "This release provides the Yarn Classic and Yarn 2+ tasks for Azure DevOps pipelines." >> release_notes.md
          echo "" >> release_notes.md
          echo "### \U0001F4DD Changelog" >> release_notes.md
          echo "${{ steps.tag_version.outputs.changelog }}" >> release_notes.md
          echo "" >> release_notes.md
          echo "---" >> release_notes.md
          echo "" >> release_notes.md
          echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/${{ steps.tag_version.outputs.previous_tag }}...${{ steps.tag_version.outputs.new_tag }}" >> release_notes.md

      - name: Create a GitHub release
        uses: ncipollo/release-action@339a81892b84b4eeb0f6e744e4574d79d0d9b8dd # v1.21.0
        with:
          allowUpdates: true
          bodyFile: release_notes.md
          generateReleaseNotes: false
          makeLatest: true
          name: Release ${{ steps.tag_version.outputs.new_tag }}
          tag: ${{ steps.tag_version.outputs.new_tag }}
