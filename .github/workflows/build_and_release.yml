name: Build and Release Extension

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  validate:
    name: Build, Lint, and Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "24.x"
          check-latest: true

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test:no-build

  release:
    name: Publish Private and Public Extensions
    runs-on: ubuntu-latest
    needs: validate
    env:
      PUBLISHER_ID: ${{ secrets.PUBLISHERID }}
      EXTENSION_AUTHOR: ${{ secrets.EXTENSION_AUTHOR }}
      PRIVATE_EXTENSION_ID: ${{ secrets.PRIVATE_EXTENSIONID }}
      PRIVATE_EXTENSION_NAME: ${{ secrets.PRIVATE_EXTENSION_NAME }}
      PRIVATE_TASK_ID_YARN: ${{ secrets.PRIVATE_TASK_ID_YARN }}
      PRIVATE_TASK_ID_YARN_INSTALLER: ${{ secrets.PRIVATE_TASK_ID_YARN_INSTALLER }}
      PUBLIC_EXTENSION_ID: ${{ secrets.PUBLIC_EXTENSION_ID }}
      PUBLIC_EXTENSION_NAME: ${{ secrets.PUBLIC_EXTENSION_NAME }}
      PUBLIC_TASK_ID_YARN: ${{ secrets.PUBLIC_TASK_ID_YARN }}
      PUBLIC_TASK_ID_YARN_INSTALLER: ${{ secrets.PUBLIC_TASK_ID_YARN_INSTALLER }}
      TASK_YARN_NAME: ${{ secrets.TASK_YARN_NAME }}
      TASK_YARN_INSTALLER_NAME: ${{ secrets.TASK_YARN_INSTALLER_NAME }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Install GitVersion
        uses: gittools/actions/gitversion/setup@bc6623af8fc07d5a8903052dd46da33403eec8e8 # v4.5.0
        with:
          versionSpec: "6.x"
          preferLatestVersion: true

      - name: Determine Version
        uses: gittools/actions/gitversion/execute@bc6623af8fc07d5a8903052dd46da33403eec8e8 # v4.5.0
        with:
          configFilePath: GitVersion.yml

      - name: Set release variables
        id: set_release_vars
        run: |
          EPOCH_MINUTES=$(( $(date -u +%s) / 60 ))
          PRIVATE_EXTENSION_VERSION="${GitVersion_Major}.${GitVersion_Minor}.${EPOCH_MINUTES}"
          RELEASE_VERSION="${GitVersion_MajorMinorPatch}"
          RELEASE_TAG="v${GitVersion_MajorMinorPatch}"

          echo "PRIVATE_EXTENSION_VERSION=${PRIVATE_EXTENSION_VERSION}" >> "$GITHUB_ENV"
          echo "RELEASE_VERSION=${RELEASE_VERSION}" >> "$GITHUB_ENV"
          echo "RELEASE_TAG=${RELEASE_TAG}" >> "$GITHUB_ENV"
          echo "release_tag=${RELEASE_TAG}" >> "$GITHUB_OUTPUT"

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "24.x"
          check-latest: true

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Prepare private manifests
        run: |
          node -e '
            const fs = require("fs");
            const [major, minor, patch] = process.env.PRIVATE_EXTENSION_VERSION.split(".").map((v) => Number.parseInt(v, 10));

            const extensionFile = "Extension/vss-extension.json";
            const extensionManifest = JSON.parse(fs.readFileSync(extensionFile, "utf8"));
            extensionManifest.publisher = process.env.PUBLISHER_ID;
            extensionManifest.id = process.env.PRIVATE_EXTENSION_ID;
            extensionManifest.name = process.env.PRIVATE_EXTENSION_NAME;
            extensionManifest.version = process.env.PRIVATE_EXTENSION_VERSION;
            fs.writeFileSync(extensionFile, JSON.stringify(extensionManifest, null, 4) + "\n");

            const applyTaskManifest = (file, id, name) => {
              const manifest = JSON.parse(fs.readFileSync(file, "utf8"));
              manifest.id = id;
              manifest.name = name;
              manifest.author = process.env.EXTENSION_AUTHOR;
              manifest.version = { Major: major, Minor: minor, Patch: patch };
              fs.writeFileSync(file, JSON.stringify(manifest, null, 2) + "\n");
            };

            applyTaskManifest("Tasks/Yarn/task.json", process.env.PRIVATE_TASK_ID_YARN, process.env.TASK_YARN_NAME);
            applyTaskManifest("Tasks/YarnInstaller/task.json", process.env.PRIVATE_TASK_ID_YARN_INSTALLER, process.env.TASK_YARN_INSTALLER_NAME);
          '

      - name: Package private extension
        run: npm run package -- --version "$PRIVATE_EXTENSION_VERSION" --noversiontransform

      - name: Install tfx-cli
        run: npm install -g tfx-cli

      - name: Publish private extension
        env:
          AZURE_DEVOPS_EXT_PAT: ${{ secrets.AZURE_DEVOPS_EXT_PAT }}
          AZURE_DEVOPS_ORGS: ${{ secrets.AZURE_DEVOPS_ORGS }}
        run: |
          if [[ -z "$AZURE_DEVOPS_EXT_PAT" || -z "$AZURE_DEVOPS_ORGS" ]]; then
            echo "Required private publish secrets are not configured. Skipping private publish."
            exit 0
          fi

          VSIX_PATH=$(find .BuildOutput/dev -maxdepth 1 -name '*.vsix' | head -n 1)
          if [[ -z "$VSIX_PATH" ]]; then
            echo "No private VSIX found under .BuildOutput/dev."
            exit 1
          fi

          tfx extension publish \
            --vsix "$VSIX_PATH" \
            --publisher "$PUBLISHER_ID" \
            --extension-id "${PRIVATE_EXTENSION_ID}-dev" \
            --override '{"public": false}' \
            --service-url https://marketplace.visualstudio.com \
            --token "$AZURE_DEVOPS_EXT_PAT" \
            --share-with "$AZURE_DEVOPS_ORGS" \
            --no-prompt

      - name: Prepare public manifests
        run: |
          node -e '
            const fs = require("fs");
            const [major, minor, patch] = process.env.RELEASE_VERSION.split(".").map((v) => Number.parseInt(v, 10));

            const extensionFile = "Extension/vss-extension.json";
            const extensionManifest = JSON.parse(fs.readFileSync(extensionFile, "utf8"));
            extensionManifest.publisher = process.env.PUBLISHER_ID;
            extensionManifest.id = process.env.PUBLIC_EXTENSION_ID;
            extensionManifest.name = process.env.PUBLIC_EXTENSION_NAME;
            extensionManifest.version = process.env.RELEASE_VERSION;
            fs.writeFileSync(extensionFile, JSON.stringify(extensionManifest, null, 4) + "\n");

            const applyTaskManifest = (file, id, name) => {
              const manifest = JSON.parse(fs.readFileSync(file, "utf8"));
              manifest.id = id;
              manifest.name = name;
              manifest.author = process.env.EXTENSION_AUTHOR;
              manifest.version = { Major: major, Minor: minor, Patch: patch };
              fs.writeFileSync(file, JSON.stringify(manifest, null, 2) + "\n");
            };

            applyTaskManifest("Tasks/Yarn/task.json", process.env.PUBLIC_TASK_ID_YARN, process.env.TASK_YARN_NAME);
            applyTaskManifest("Tasks/YarnInstaller/task.json", process.env.PUBLIC_TASK_ID_YARN_INSTALLER, process.env.TASK_YARN_INSTALLER_NAME);
          '

      - name: Package public extension
        run: npm run package -- --version "$RELEASE_VERSION" --noversiontransform

      - name: Publish public extension
        env:
          AZURE_DEVOPS_EXT_PAT: ${{ secrets.AZURE_DEVOPS_EXT_PAT }}
        run: |
          if [[ -z "$AZURE_DEVOPS_EXT_PAT" ]]; then
            echo "AZURE_DEVOPS_EXT_PAT is not configured. Skipping public publish."
            exit 0
          fi

          VSIX_PATH=$(find .BuildOutput/production -maxdepth 1 -name '*.vsix' | head -n 1)
          if [[ -z "$VSIX_PATH" ]]; then
            echo "No public VSIX found under .BuildOutput/production."
            exit 1
          fi

          tfx extension publish \
            --vsix "$VSIX_PATH" \
            --publisher "$PUBLISHER_ID" \
            --extension-id "$PUBLIC_EXTENSION_ID" \
            --override '{"public": true}' \
            --service-url https://marketplace.visualstudio.com \
            --token "$AZURE_DEVOPS_EXT_PAT" \
            --no-prompt

      - name: Create and push tag
        run: |
          git fetch --tags --force
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$RELEASE_TAG" -m "$RELEASE_TAG"
          git push origin "$RELEASE_TAG"

      - name: Create GitHub release
        uses: ncipollo/release-action@339a81892b84b4eeb0f6e744e4574d79d0d9b8dd # v1.21.0
        with:
          allowUpdates: true
          generateReleaseNotes: true
          makeLatest: true
          name: Release ${{ steps.set_release_vars.outputs.release_tag }}
          tag: ${{ steps.set_release_vars.outputs.release_tag }}
