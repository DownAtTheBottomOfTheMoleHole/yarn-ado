---
# MegaLinter configuration for yarn-ado
# Linting config for TypeScript/Node.js Azure DevOps tasks

# Auto-fix settings
APPLY_FIXES: all
CLEAR_REPORT_FOLDER: true

# Disable problematic linters and strict formatters
DISABLE_LINTERS:
  - REPOSITORY_TRIVY
  - REPOSITORY_GRYPE
  - REPOSITORY_GIT_DIFF
  - JSON_V8R
  - YAML_V8R
  - JSON_JSONLINT
  - JSON_PRETTIER
  - JSON_ESLINT_PLUGIN_JSONC # incompatible with ESLint flat config (eslint.config.js)
  - COPYPASTE_JSCPD
  - ENV_DOTENV_LINTER
  - BASH_SHFMT

# Show elapsed time for performance tracking
SHOW_ELAPSED_TIME: true

# Report generation
REPORT_OUTPUT_FOLDER: ./megalinter-reports
UPDATED_SOURCES_REPORTER: true
UPDATED_SOURCES_REPORTER_DIR: updated_sources
CONFIG_REPORTER: true
CONFIG_REPORTER_SUB_FOLDER: IDE-config

# Skip build artifacts and reports
EXCLUDED_DIRECTORIES:
  - node_modules
  - .git
  - .BuildOutput
  - megalinter-reports

FILTER_REGEX_EXCLUDE: "(node_modules/|\\.git/|\\.BuildOutput/|megalinter-reports/)"
IGNORE_GITIGNORED_FILES: true

# Flavor and validation settings
FAIL_IF_MISSING_LINTER_IN_FLAVOR: false
FAIL_IF_UPDATED_SOURCES: false
FLAVOR_SUGGESTIONS: false
VALIDATE_ALL_CODEBASE: false
